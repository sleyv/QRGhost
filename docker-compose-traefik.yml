services:
  qrghost:
    image: nginx:alpine
    container_name: qrghost
    labels:
      - traefik.enable=true
      - traefik.http.routers.qrghost.rule=Host(`qrghost.your.domain`)
      - traefik.http.routers.qrghost.entrypoints=websecure
      - traefik.http.routers.qrghost.tls=true
      - traefik.http.services.qrghost.loadbalancer.server.port=80
      - traefik.docker.network=traefik_default
    networks:
      - default
      - traefik_default
    volumes:
      - ./public/index.html:/usr/share/nginx/html/index.html:ro
      - ./public/manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./public/sw.js:/usr/share/nginx/html/sw.js:ro
      - ./public/icon-192.png:/usr/share/nginx/html/icon-192.png:ro
      - ./public/icon-512.png:/usr/share/nginx/html/icon-512.png:ro

    restart: unless-stopped
networks:
  traefik_default:
    external: true

